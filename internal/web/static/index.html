<!DOCTYPE html>
<!-- Alpine.js vendored: v3.15.12 (cdn.jsdelivr.net/npm/alpinejs@3/dist/cdn.min.js) -->
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ccquota Dashboard</title>
  <link rel="stylesheet" href="style.css">
  <script defer src="app.js"></script>
  <script defer src="alpine.min.js"></script>
</head>
<body x-data="dashboard" x-init="init()">

  <!-- 登入畫面（未認證時顯示；authReady 前不顯示，避免閃一下登入頁） -->
  <div id="login-screen" x-show="authReady && !authed" style="display:none">
    <div class="login-card">
      <h1 x-text="t('login_title')">Sign in to ccquota</h1>
      <form @submit.prevent="doLogin()">
        <div class="form-row">
          <label x-text="t('login_password')">Admin password</label>
          <input type="password" x-model="loginPassword" autocomplete="current-password" autofocus>
        </div>
        <button type="submit" :disabled="loginBtnDisabled" x-text="t('login_btn')">Sign in</button>
      </form>
      <div class="login-error" x-show="loginError" x-text="loginError" style="display:none"></div>
    </div>
  </div>

  <!-- 主畫面（已認證時顯示） -->
  <div id="app" x-show="authReady && authed" style="display:none">

    <header>
      <h1 x-text="t('heading')">ccquota Dashboard</h1>
      <div class="header-right">

        <!-- 語言下拉選單 -->
        <div class="lang-dropdown" x-data
          @keydown.escape.window="langOpen = false"
          @click.outside="langOpen = false">
          <button
            class="lang-toggle"
            :aria-expanded="langOpen"
            aria-haspopup="listbox"
            @click="langOpen = !langOpen"
            :aria-label="t('lang_menu_label')">
            <!-- Globe icon -->
            <svg width="14" height="14" viewBox="0 0 16 16" fill="none" aria-hidden="true"
              xmlns="http://www.w3.org/2000/svg">
              <circle cx="8" cy="8" r="6.5" stroke="currentColor" stroke-width="1.3"/>
              <path d="M8 1.5C8 1.5 5.5 4.5 5.5 8C5.5 11.5 8 14.5 8 14.5" stroke="currentColor" stroke-width="1.1" stroke-linecap="round"/>
              <path d="M8 1.5C8 1.5 10.5 4.5 10.5 8C10.5 11.5 8 14.5 8 14.5" stroke="currentColor" stroke-width="1.1" stroke-linecap="round"/>
              <path d="M1.5 8H14.5" stroke="currentColor" stroke-width="1.1" stroke-linecap="round"/>
              <path d="M2.3 5H13.7M2.3 11H13.7" stroke="currentColor" stroke-width="0.9" stroke-linecap="round"/>
            </svg>
            <span x-text="langShortLabel(lang)"></span>
            <svg width="10" height="10" viewBox="0 0 10 10" fill="none" aria-hidden="true"
              xmlns="http://www.w3.org/2000/svg"
              :style="langOpen ? 'transform:rotate(180deg)' : ''">
              <path d="M2 3.5L5 6.5L8 3.5" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </button>
          <ul class="lang-menu" role="listbox" x-show="langOpen" style="display:none"
            :aria-label="t('lang_menu_label')">
            <li role="option" :aria-selected="lang === 'en'" :class="{ active: lang === 'en' }"
              @click="setLang('en')">EN</li>
            <li role="option" :aria-selected="lang === 'zh-TW'" :class="{ active: lang === 'zh-TW' }"
              @click="setLang('zh-TW')">繁中</li>
            <li role="option" :aria-selected="lang === 'zh-CN'" :class="{ active: lang === 'zh-CN' }"
              @click="setLang('zh-CN')">简中</li>
          </ul>
        </div>

        <!-- 最後更新時間 -->
        <div class="refresh-info" x-show="lastUpdated">
          <span class="refresh-dot" aria-hidden="true"></span>
          <span x-text="t('last_updated') + ' ' + lastUpdated"></span>
        </div>

        <!-- 設定按鈕（gear icon） -->
        <button class="icon-btn" @click="openSettingsModal()" :aria-label="t('settings')">
          <svg width="15" height="15" viewBox="0 0 15 15" fill="none" aria-hidden="true"
            xmlns="http://www.w3.org/2000/svg">
            <path d="M7.5 9.5a2 2 0 1 0 0-4 2 2 0 0 0 0 4Z" stroke="currentColor" stroke-width="1.3"/>
            <path d="M12.2 8.6c.1-.36.1-.73 0-1.1l1.2-.93a.3.3 0 0 0 .07-.38l-1.13-1.96a.3.3 0 0 0-.37-.13l-1.4.56a4.1 4.1 0 0 0-.96-.55l-.21-1.5a.3.3 0 0 0-.3-.25H7.06a.3.3 0 0 0-.3.25l-.21 1.5c-.35.14-.67.32-.96.55l-1.4-.56a.3.3 0 0 0-.37.13L2.69 6.19a.3.3 0 0 0 .07.38l1.2.93c-.1.37-.1.74 0 1.1l-1.2.93a.3.3 0 0 0-.07.38l1.13 1.96c.08.14.25.19.37.13l1.4-.56c.29.22.61.41.96.55l.21 1.5c.04.14.16.25.3.25h2.26c.14 0 .26-.1.3-.25l.21-1.5c.35-.14.67-.32.96-.55l1.4.56c.12.06.29.01.37-.13l1.13-1.96a.3.3 0 0 0-.07-.38l-1.2-.93Z"
              stroke="currentColor" stroke-width="1.1"/>
          </svg>
        </button>

        <button class="logout-btn" @click="doLogout()" x-text="t('logout')">Sign out</button>
      </div>
    </header>

    <main>

      <!-- Accounts section -->
      <section id="accounts-section">
        <div class="section-header">
          <h2 x-text="t('accounts_section')">Accounts</h2>
          <div class="section-actions">
            <button class="btn-secondary" @click="openConnectModal()" x-text="t('open_connect_modal')">Connect Account</button>
            <button class="btn-secondary" @click="openEnrollModal()" x-text="t('open_enroll_modal')">Add User</button>
          </div>
        </div>

        <div id="accounts-grid">

          <!-- No accounts -->
          <template x-if="accounts.length === 0">
            <p class="no-reading" x-text="t('no_accounts')"></p>
          </template>

          <!-- Account cards -->
          <template x-for="acct in accounts" :key="acct.id">
            <div class="account-wrap">

              <!-- 帳號摘要列 -->
              <div class="account-summary" :class="{ stale: acct.stale }">
                <div class="sum-metric">
                  <span x-text="acct.label || acct.id"></span>
                  <strong style="font-family:var(--mono);font-size:11px;color:var(--ink-3)" x-text="acct.id"></strong>
                </div>
                <span class="stale-badge" x-show="acct.stale" x-text="t('stale_warning')" style="display:none"></span>
                <div class="sum-metric" x-show="acct.has_reading" style="display:none">
                  <span x-text="t('seven_day_label')"></span>
                  <strong x-text="fmtPct(acct.seven_day)"></strong>
                </div>
                <div class="sum-metric" x-show="acct.has_reading" style="display:none">
                  <span x-text="t('five_hour_label')"></span>
                  <strong x-text="fmtPct(acct.five_hour)"></strong>
                </div>
                <div class="sum-metric" x-show="acct.has_reading" style="display:none">
                  <span x-text="t('resets_in')"></span>
                  <strong x-text="countdown(acct.seven_day_resets_at)"></strong>
                </div>
                <div class="sum-metric" x-show="acct.has_reading" style="display:none">
                  <span x-text="t('weekly_budget')"></span>
                  <strong x-text="'$' + (acct.cost.weekly_budget_usd || 0).toFixed(2)"></strong>
                </div>
                <span class="no-reading" x-show="!acct.has_reading" x-text="t('no_reading')"
                  style="display:none;padding:0;font-size:12px;"></span>
              </div>

              <!-- 使用者區塊標題 -->
              <div style="font-size:13px;font-weight:600;color:var(--ink-2);margin-bottom:12px;"
                x-text="t('users_section')"></div>

              <!-- 使用者卡片格線 -->
              <div class="user-grid">
                <p class="no-reading" x-show="(acct.cost.users || []).length === 0"
                  x-text="t('no_users')" style="display:none;text-align:left;padding:8px 0;"></p>
                <template x-for="u in (acct.cost.users || [])" :key="u.user">
                  <div class="user-card">

                    <!-- 使用者卡片 header -->
                    <div class="uc-head">
                      <strong x-text="u.user"></strong>
                      <div class="range-toggle">
                        <button :class="{active: rangeFor(u.user)==='24h'}"
                          @click="setUserRange(acct.id, u.user, '24h')"
                          x-text="t('range_24h')"></button>
                        <button :class="{active: rangeFor(u.user)==='7d'}"
                          @click="setUserRange(acct.id, u.user, '7d')"
                          x-text="t('range_7d')"></button>
                      </div>
                    </div>

                    <!-- 數字摘要 -->
                    <div class="uc-metrics">
                      <div class="m">
                        <div style="font-size:11px;color:var(--ink-3)" x-text="t('user_period_cost')"></div>
                        <strong x-text="'$' + u.cost_usd.toFixed(2)"></strong>
                      </div>
                      <div class="m">
                        <div style="font-size:11px;color:var(--ink-3)" x-text="t('user_period_tokens')"></div>
                        <strong x-text="u.tokens"></strong>
                      </div>
                      <div class="m">
                        <div style="font-size:11px;color:var(--ink-3)" x-text="t('user_share')"></div>
                        <strong x-text="u.share_pct.toFixed(1) + '%'"></strong>
                      </div>
                    </div>

                    <!-- 費用趨勢圖 -->
                    <div class="user-chart">
                      <div class="chart-label" x-text="t('chart_cost')"></div>
                      <canvas :id="'cost-' + u.user" height="56"
                        x-effect="$nextTick(() => drawUserCharts(u.user))"></canvas>
                    </div>

                    <!-- Token 趨勢圖 -->
                    <div class="user-chart">
                      <div class="chart-label" x-text="t('chart_tokens')"></div>
                      <canvas :id="'tok-' + u.user" height="56"></canvas>
                    </div>

                    <!-- 操作按鈕 -->
                    <div class="uc-actions">
                      <button class="btn-secondary" @click="copyInstall(acct.id, u.user)"
                        x-text="copyMsg === u.user ? t('copied') : t('copy_install')"></button>
                      <button class="btn-secondary"
                        style="color:var(--red);border-color:var(--red);"
                        @click="removeUser(acct.id, u.user)"
                        x-text="t('delete_user')"></button>
                    </div>

                  </div>
                </template>
              </div>

            </div>
          </template>

        </div>
      </section>

    </main>

    <!-- ── Connect Account modal ────────────────────────────────────────────── -->
    <dialog class="app-dialog" x-ref="connectDialog"
      @close="closeConnectModal()"
      @click.self="closeConnectModal()">
      <div class="dialog-inner">
        <div class="dialog-header">
          <h2 x-text="t('connect_section')">Connect Account</h2>
          <button class="dialog-close" @click="closeConnectModal()" :aria-label="t('close')">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none" aria-hidden="true"
              xmlns="http://www.w3.org/2000/svg">
              <path d="M3 3L13 13M13 3L3 13" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
            </svg>
          </button>
        </div>

        <div class="connect-form dialog-body">
          <div class="form-row">
            <label x-text="t('account_id_label')">Account ID:</label>
            <input type="text" x-model="connectId" placeholder="main">
          </div>
          <div class="form-row">
            <label x-text="t('account_label_label')">Label (optional):</label>
            <input type="text" x-model="connectLabel" placeholder="My Account">
          </div>

          <button @click="startLogin()" :disabled="startBtnDisabled" x-text="t('connect_btn')">Start OAuth Flow</button>

          <!-- OAuth flow (shown after startLogin) -->
          <div id="oauth-flow" x-show="showOauthFlow" style="display:none">
            <div class="form-row" style="margin-top:16px;padding-top:16px;border-top:1px solid var(--border)">
              <label x-text="t('authorize_url_label')">Authorize URL:</label>
              <div class="url-row">
                <input type="text" :value="authorizeUrl" readonly>
                <a class="btn-link" :href="authorizeUrl" target="_blank" rel="noopener"
                  x-text="t('open_url_btn')">Open in new tab</a>
              </div>
            </div>
            <div class="form-row">
              <label x-text="t('code_label')">Paste OAuth Code:</label>
              <input type="text" x-model="oauthCode" placeholder="code#state">
            </div>
            <button @click="completeLogin()" x-text="t('complete_btn')">Complete Login</button>
          </div>

          <!-- Status message -->
          <div id="connect-msg"
            x-show="connectMsg"
            x-text="connectMsg"
            :class="connectMsgType"
            style="display:none">
          </div>
        </div>
      </div>
    </dialog>

    <!-- ── Add User (enroll) modal ──────────────────────────────────────────── -->
    <dialog class="app-dialog" x-ref="enrollDialog"
      @close="closeEnrollModal()"
      @click.self="closeEnrollModal()">
      <div class="dialog-inner">
        <div class="dialog-header">
          <h2 x-text="t('enroll_section')">Add User</h2>
          <button class="dialog-close" @click="closeEnrollModal()" :aria-label="t('close')">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none" aria-hidden="true"
              xmlns="http://www.w3.org/2000/svg">
              <path d="M3 3L13 13M13 3L3 13" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
            </svg>
          </button>
        </div>

        <div class="connect-form dialog-body">
          <div class="form-row">
            <label x-text="t('enroll_account_label')">Account:</label>
            <select x-model="enrollAccount">
              <template x-for="acct in accounts" :key="acct.id">
                <option :value="acct.id" x-text="acct.label || acct.id"></option>
              </template>
            </select>
          </div>
          <div class="form-row">
            <label x-text="t('enroll_user_label')">Display name:</label>
            <input type="text" x-model="enrollUser" placeholder="alice">
          </div>

          <button @click="generateEnrollLink()" :disabled="enrollBtnDisabled" x-text="t('enroll_btn')">Generate install link</button>

          <!-- Result -->
          <div x-show="enrollOneliner" style="display:none;margin-top:16px;padding-top:16px;border-top:1px solid var(--border)">
            <div class="form-row">
              <label x-text="t('enroll_link_label')">One-liner:</label>
              <div class="url-row">
                <input type="text" :value="enrollOneliner" readonly>
                <button @click="copyEnrollLink()" x-text="t('enroll_copy_btn')">Copy</button>
              </div>
            </div>
            <div class="cost-note" x-text="t('enroll_expires_note')"></div>
          </div>

          <!-- Status message -->
          <div id="enroll-msg"
            x-show="enrollMsg"
            x-text="enrollMsg"
            :class="enrollMsgType"
            style="display:none">
          </div>
        </div>
      </div>
    </dialog>

    <!-- ── Settings modal ──────────────────────────────────────────────────── -->
    <dialog class="app-dialog" x-ref="settingsDialog"
      @close="closeSettingsModal()"
      @click.self="closeSettingsModal()">
      <div class="dialog-inner">
        <div class="dialog-header">
          <h2 x-text="t('settings')"></h2>
          <button class="dialog-close" @click="closeSettingsModal()" :aria-label="t('close')">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none" aria-hidden="true"
              xmlns="http://www.w3.org/2000/svg">
              <path d="M3 3L13 13M13 3L3 13" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
            </svg>
          </button>
        </div>
        <div class="dialog-body">

          <!-- tab bar -->
          <div class="dialog-tabs">
            <button type="button" :class="{active: settingsTab==='account'}" @click="settingsTab='account'" x-text="t('tab_account')"></button>
            <button type="button" :class="{active: settingsTab==='notifications'}" @click="settingsTab='notifications'; loadNotifications()" x-text="t('tab_notifications')"></button>
          </div>

          <!-- ── Account tab ───────────────────────────────────────────────── -->
          <div x-show="settingsTab==='account'">
            <div class="form-row">
              <label x-text="t('current_password')"></label>
              <input type="password" x-model="settingsCurPw" autocomplete="current-password">
            </div>
            <div class="form-row">
              <label x-text="t('new_password')"></label>
              <input type="password" x-model="settingsNewPw" autocomplete="new-password">
            </div>
            <div class="form-row">
              <label x-text="t('confirm_password')"></label>
              <input type="password" x-model="settingsConfirmPw" autocomplete="new-password">
            </div>
            <button @click="doChangePassword()" :disabled="settingsBtnDisabled" x-text="t('change_password')"></button>
            <div x-show="settingsMsg" x-text="settingsMsg" :class="settingsMsgType" style="display:none;margin-top:12px;font-size:13px;"></div>
          </div>

          <!-- ── Notifications tab ─────────────────────────────────────────── -->
          <div x-show="settingsTab==='notifications'" style="display:none">
            <h3 x-text="t('notif_channels')" style="font-size:13px;font-weight:600;color:var(--ink-2);margin-bottom:12px;"></h3>
            <p class="no-reading" x-show="channels.length===0" x-text="t('notif_no_channels')" style="display:none;text-align:left;padding:8px 0;"></p>
            <template x-for="ch in channels" :key="ch.id">
              <div class="channel-row">
                <div class="channel-head">
                  <strong x-text="ch.type"></strong>
                  <label style="display:flex;align-items:center;gap:6px;font-size:13px;"><input type="checkbox" x-model="ch.enabled"> <span x-text="t('notif_enabled')"></span></label>
                </div>
                <template x-if="ch.type==='telegram'">
                  <div class="form-row" style="margin-bottom:0;gap:8px;">
                    <input type="password" :placeholder="t('notif_bot_token')" x-model="ch.config.bot_token" autocomplete="off">
                    <small style="font-size:11px;color:var(--ink-3);" x-text="t('notif_token_keep_hint')"></small>
                    <input type="text" :placeholder="t('notif_chat_id')" x-model="ch.config.chat_id">
                  </div>
                </template>
                <template x-if="ch.type==='webhook'">
                  <div class="form-row" style="margin-bottom:0;">
                    <input type="text" :placeholder="t('notif_webhook_url')" x-model="ch.config.url">
                  </div>
                </template>
                <div class="channel-actions">
                  <button type="button" @click="saveChannel(ch)" x-text="t('notif_save')"></button>
                  <button type="button" @click="testChannel(ch)" x-text="t('notif_test')"></button>
                  <button type="button" @click="deleteChannel(ch)" x-text="t('notif_delete')"></button>
                </div>
              </div>
            </template>

            <h4 x-text="t('notif_add_channel')" style="font-size:13px;font-weight:600;color:var(--ink-2);margin:16px 0 10px;"></h4>
            <div class="form-row">
              <select x-model="newChannel.type">
                <option value="telegram">telegram</option>
                <option value="webhook">webhook</option>
              </select>
            </div>
            <template x-if="newChannel.type==='telegram'">
              <div class="form-row">
                <input type="password" :placeholder="t('notif_bot_token')" x-model="newChannel.config.bot_token" autocomplete="off">
                <input type="text" :placeholder="t('notif_chat_id')" x-model="newChannel.config.chat_id">
              </div>
            </template>
            <template x-if="newChannel.type==='webhook'">
              <div class="form-row">
                <input type="text" :placeholder="t('notif_webhook_url')" x-model="newChannel.config.url">
              </div>
            </template>
            <button type="button" @click="addChannel()" x-text="t('notif_add_channel')" style="margin-bottom:20px;"></button>

            <h3 x-text="t('notif_thresholds')" style="font-size:13px;font-weight:600;color:var(--ink-2);margin-bottom:12px;"></h3>
            <div class="form-row">
              <label x-text="t('notif_seven_day_warn')"></label>
              <input type="number" x-model.number="thresholds.SevenDayWarn">
            </div>
            <div class="form-row">
              <label x-text="t('notif_seven_day_crit')"></label>
              <input type="number" x-model.number="thresholds.SevenDayCrit">
            </div>
            <div class="form-row">
              <label x-text="t('notif_five_hour_crit')"></label>
              <input type="number" x-model.number="thresholds.FiveHourCrit">
            </div>
            <div class="form-row">
              <label style="display:flex;align-items:center;gap:6px;"><input type="checkbox" x-model="thresholds.ResetNotify"> <span x-text="t('notif_reset_notify')"></span></label>
            </div>
            <button type="button" @click="saveThresholds()" x-text="t('notif_save')"></button>

            <div x-show="notifMsg" x-text="notifMsg" :class="notifMsgType" style="display:none;margin-top:12px;font-size:13px;"></div>
          </div>

        </div>
      </div>
    </dialog>

    <!-- ── Must-change password modal (non-dismissible) ────────────────────── -->
    <dialog class="app-dialog" x-ref="mustChangeDialog"
      @cancel.prevent
      @click.self.prevent>
      <div class="dialog-inner">
        <div class="dialog-header">
          <h2 x-text="t('must_change_title')"></h2>
        </div>
        <div class="connect-form dialog-body">
          <p class="cost-note" x-text="t('must_change_note')" style="margin-bottom:16px;"></p>
          <div class="form-row">
            <label x-text="t('new_password')"></label>
            <input type="password" x-model="mustChangeNewPw" autocomplete="new-password">
          </div>
          <div class="form-row">
            <label x-text="t('confirm_password')"></label>
            <input type="password" x-model="mustChangeConfirmPw" autocomplete="new-password">
          </div>
          <button @click="doMustChangePassword()" :disabled="mustChangeBtnDisabled" x-text="t('change_password')"></button>
          <div x-show="mustChangeMsg" x-text="mustChangeMsg" class="error" style="display:none;margin-top:12px;font-size:13px;color:var(--red);"></div>
        </div>
      </div>
    </dialog>

  </div>

</body>
</html>
